<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main">
        <h1>My Currency Converter</h1>

        <form id="converter-form">
            <label for="amount">Enter Amount</label>
            <input
                type="number"
                id="amount"
                name="amount"
                min="0"
                step="any"
                placeholder="Enter amount"
                required
            >

            <label for="fromCurrency">From Currency</label>
            <select id="fromCurrency" name="fromCurrency"></select>

            <label for="toCurrency">To Currency</label>
            <select id="toCurrency" name="toCurrency"></select>

            <button type="submit" id="convertBtn">
                Convert
            </button>
        </form>

        <div class="result-container">
            <p id="output">Converted value will appear here</p>
            <p id="message"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
